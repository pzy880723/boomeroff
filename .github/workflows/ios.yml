name: iOS Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Enable Corepack (for yarn)
        run: corepack enable && corepack prepare yarn@stable --activate
      - name: Install dependencies
        run: yarn install --immutable
      - run: yarn build
      - name: Sync Capacitor
        run: npx cap sync ios
      - name: Pod install
        run: cd ios/App && pod install
      - name: Build iOS Simulator
        run: |
          cd ios/App
          xcodebuild -scheme App -configuration Release -sdk iphonesimulator -destination 'generic/platform=iOS Simulator' -derivedDataPath ./build build
      - uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: ios/App/build/Build/Products/Release-iphonesimulator/App.app
