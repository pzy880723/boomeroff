# Include these directives inside the HTTPS server block for ai.boomeroff.com.
# Pre-compressed assets are generated during deployment with:
# find /var/www/ai-boomeroff/assets -type f \
#   \( -name '*.js' -o -name '*.css' -o -name '*.svg' -o -name '*.json' \) \
#   -exec gzip -9 -k -f {} \;
gzip on;
gzip_static on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    application/json
    application/javascript
    text/xml
    application/xml
    application/xml+rss
    image/svg+xml;

# Route Supabase traffic through Tencent Cloud to avoid slow direct
# connections from mainland networks. User data is never cached here.
location ^~ /supabase/realtime/v1/ {
    proxy_pass https://narqwgwpqglathwtyevz.supabase.co/realtime/v1/;
    proxy_ssl_server_name on;
    proxy_ssl_name narqwgwpqglathwtyevz.supabase.co;
    proxy_set_header Host narqwgwpqglathwtyevz.supabase.co;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;
    proxy_buffering off;
}

location ^~ /supabase/ {
    client_max_body_size 500m;
    proxy_pass https://narqwgwpqglathwtyevz.supabase.co/;
    proxy_ssl_server_name on;
    proxy_ssl_name narqwgwpqglathwtyevz.supabase.co;
    proxy_ssl_session_reuse on;
    proxy_set_header Host narqwgwpqglathwtyevz.supabase.co;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_request_buffering off;
    proxy_read_timeout 10m;
    proxy_send_timeout 10m;
    proxy_redirect https://narqwgwpqglathwtyevz.supabase.co/ /supabase/;
}

location /compose/ {
    alias /var/www/aigc-compose/;
    autoindex off;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    types {
        video/mp4 mp4;
        image/jpeg jpg jpeg;
    }
}
