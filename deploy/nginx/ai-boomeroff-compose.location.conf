# Include these directives inside the HTTPS server block for ai.boomeroff.com.
location /compose/ {
    alias /var/www/aigc-compose/;
    autoindex off;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    types {
        video/mp4 mp4;
        image/jpeg jpg jpeg;
    }
}
